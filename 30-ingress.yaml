apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: event-hub-ingress
  namespace: event-hub
  annotations:
    kubernetes.io/ingress.class: gce
    # Optional after reserving a static global IP:
    # kubernetes.io/ingress.global-static-ip-name: event-hub-ip
spec:
  ingressClassName: gce
  rules:
    - http:
        paths:
          - path: /user-service
            pathType: Prefix
            backend:
              service:
                name: gateway-service
                port:
                  number: 9090
          - path: /event-service
            pathType: Prefix
            backend:
              service:
                name: gateway-service
                port:
                  number: 9090
          - path: /booking-service
            pathType: Prefix
            backend:
              service:
                name: gateway-service
                port:
                  number: 9090
          - path: /notification-service
            pathType: Prefix
            backend:
              service:
                name: gateway-service
                port:
                  number: 9090
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: gateway-service
                port:
                  number: 9090
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: frontend-admin
                port:
                  number: 4000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-ticket
                port:
                  number: 3000
