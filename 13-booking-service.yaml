apiVersion: v1
kind: Service
metadata:
  name: booking-service
  namespace: event-hub
spec:
  ports:
    - port: 9093
      targetPort: 9093
  selector:
    app: booking-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
  namespace: event-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: booking-service
  template:
    metadata:
      labels:
        app: booking-service
    spec:
      containers:
        - name: booking-service
          image: amiru1234/booking-service-api:latest
          ports:
            - containerPort: 9093
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: SPRING_CLOUD_CONFIG_URI
              valueFrom:
                configMapKeyRef:
                  name: event-hub-config
                  key: CONFIG_SERVER_URL
            - name: SERVER_PORT
              value: "9093"
            - name: MYSQL_HOST
              valueFrom:
                configMapKeyRef:
                  name: event-hub-config
                  key: MYSQL_HOST
            - name: MYSQL_PORT
              valueFrom:
                configMapKeyRef:
                  name: event-hub-config
                  key: MYSQL_PORT
            - name: MYSQL_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: event-hub-config
                  key: MYSQL_USERNAME
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: event-hub-secrets
                  key: MYSQL_PASSWORD
            - name: MYSQL_DATABASE
              value: ec7205_booking_service
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: event-hub-secrets
                  key: RABBITMQ_DEFAULT_PASS
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://$(MYSQL_HOST):$(MYSQL_PORT)/$(MYSQL_DATABASE)?createDatabaseIfNotExist=true
            - name: SPRING_DATASOURCE_USERNAME
              value: $(MYSQL_USERNAME)
            - name: SPRING_DATASOURCE_PASSWORD
              value: $(MYSQL_PASSWORD)
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              valueFrom:
                configMapKeyRef:
                  name: event-hub-config
                  key: EUREKA_URL
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI
              valueFrom:
                configMapKeyRef:
                  name: event-hub-config
                  key: KEYCLOAK_ISSUER_URI
            - name: SPRING_RABBITMQ_HOST
              value: rabbitmq
            - name: SPRING_RABBITMQ_PORT
              value: "5672"
            - name: SPRING_RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: event-hub-secrets
                  key: RABBITMQ_DEFAULT_USER
            - name: SPRING_RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: event-hub-secrets
                  key: RABBITMQ_DEFAULT_PASS
            - name: EVENTHUB_NOTIFICATION_BOOKING_QUEUE
              valueFrom:
                configMapKeyRef:
                  name: event-hub-config
                  key: BOOKING_NOTIFICATION_QUEUE
