apiVersion: v1
kind: Service
metadata:
  name: frontend-ticket
  namespace: event-hub
  annotations:
    cloud.google.com/backend-config: '{"default":"frontend-ticket-backendconfig"}'
    cloud.google.com/neg: '{"ingress": true}'
spec:
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: frontend-ticket
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-ticket
  namespace: event-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-ticket
  template:
    metadata:
      labels:
        app: frontend-ticket
    spec:
      containers:
        - name: frontend-ticket
          image: amiru1234/event-ticket-booking-platform:latest
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          env:
            - name: NODE_ENV
              value: production
            - name: NEXT_PUBLIC_API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: event-hub-config
                  key: NEXT_PUBLIC_API_BASE_URL
            - name: SERVER_API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: event-hub-config
                  key: SERVER_API_BASE_URL
            - name: SERVER_EVENTS_API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: event-hub-config
                  key: SERVER_EVENTS_API_BASE_URL
